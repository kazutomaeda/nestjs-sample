services:
  app:
    build: .
    container_name: nestjs-sample-app
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: "mysql://root:password@mysql:3306/nestjs_sample"
      PORT: "3002"
      JWT_SECRET: "develop"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET: "nestjs-sample"
      SMTP_HOST: "mailpit"
      SMTP_PORT: "1025"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: nestjs-sample-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "password"
      MYSQL_DATABASE: "nestjs_sample"
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: nestjs-sample-minio
    ports:
      - "${MINIO_API_PORT:-9002}:9000"
      - "${MINIO_CONSOLE_PORT:-9003}:9001"
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  minio-init:
    image: minio/mc
    container_name: nestjs-sample-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      sh -c "
        until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
        mc mb --ignore-existing local/nestjs-sample;
      "

  mailpit:
    image: axllent/mailpit
    container_name: nestjs-sample-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

volumes:
  mysql-data:
  minio-data:
